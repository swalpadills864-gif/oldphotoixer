<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
  </defs>

  <!-- Camera icon -->
  <g transform="translate(5, 10)">
    <rect x="0" y="5" width="35" height="30" rx="5" fill="none" stroke="url(#logoGrad)" stroke-width="2.5"/>
    <circle cx="17.5" cy="20" r="10" fill="none" stroke="url(#logoGrad)" stroke-width="2"/>
    <circle cx="17.5" cy="20" r="4" fill="#e94560"/>
    <rect x="8" y="0" width="15" height="6" rx="2" fill="url(#logoGrad)"/>
  </g>

  <!-- Text -->
  <text x="55" y="38" font-family="Arial, sans-serif" font-size="24" font-weight="bold">
    <tspan fill="#1a1a2e">Old</tspan><tspan fill="url(#logoGrad)">PhotoFixer</tspan>
  </text>
</svg>