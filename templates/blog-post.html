<!DOCTYPE html>
<html lang="{{lang}}" dir="{{dir}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <meta name="description" content="{{description}}">
    <meta name="keywords" content="{{keywords}}">
    <meta name="author" content="OldPhotoFixer">
    <meta name="robots" content="index, follow, max-image-preview:large">
    <meta name="googlebot" content="index, follow">

    <!-- Geographic Meta Tags -->
    <meta name="geo.region" content="US">
    <meta name="geo.placename" content="San Francisco">
    <meta name="geo.position" content="37.7749;-122.4194">
    <meta name="ICBM" content="37.7749, -122.4194">

    <!-- Open Graph -->
    <meta property="og:type" content="article">
    <meta property="og:url" content="{{canonicalUrl}}">
    <meta property="og:title" content="{{title}}">
    <meta property="og:description" content="{{description}}">
    <meta property="og:image" content="https://oldphotoixer.ai-world.top/images/og-image.svg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:locale" content="{{ogLocale}}">
    <meta property="og:site_name" content="OldPhotoFixer">
    <meta property="article:published_time" content="{{date}}">
    <meta property="article:author" content="https://oldphotoixer.ai-world.top/about/author.html">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="{{canonicalUrl}}">
    <meta name="twitter:title" content="{{title}}">
    <meta name="twitter:description" content="{{description}}">
    <meta name="twitter:image" content="https://oldphotoixer.ai-world.top/images/og-image.svg">

    <!-- Canonical and hreflang -->
    <link rel="canonical" href="{{canonicalUrl}}">
    <link rel="alternate" hreflang="en" href="https://oldphotoixer.ai-world.top/blog/{{slug}}.html">
    <link rel="alternate" hreflang="zh" href="https://oldphotoixer.ai-world.top/zh/blog/{{slug}}.html">
    <link rel="alternate" hreflang="ja" href="https://oldphotoixer.ai-world.top/ja/blog/{{slug}}.html">
    <link rel="alternate" hreflang="ko" href="https://oldphotoixer.ai-world.top/ko/blog/{{slug}}.html">
    <link rel="alternate" hreflang="es" href="https://oldphotoixer.ai-world.top/es/blog/{{slug}}.html">
    <link rel="alternate" hreflang="fr" href="https://oldphotoixer.ai-world.top/fr/blog/{{slug}}.html">
    <link rel="alternate" hreflang="pt" href="https://oldphotoixer.ai-world.top/pt/blog/{{slug}}.html">
    <link rel="alternate" hreflang="ar" href="https://oldphotoixer.ai-world.top/ar/blog/{{slug}}.html">
    <link rel="alternate" hreflang="de" href="https://oldphotoixer.ai-world.top/de/blog/{{slug}}.html">
    <link rel="alternate" hreflang="ru" href="https://oldphotoixer.ai-world.top/ru/blog/{{slug}}.html">
    <link rel="alternate" hreflang="x-default" href="https://oldphotoixer.ai-world.top/blog/{{slug}}.html">

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="{{cssPath}}../css/style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📷</text></svg>">

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@graph": [
            {
                "@type": "Article",
                "@id": "{{canonicalUrl}}#article",
                "headline": "{{title}}",
                "description": "{{description}}",
                "datePublished": "{{date}}",
                "dateModified": "{{date}}",
                "image": {
                    "@type": "ImageObject",
                    "url": "https://oldphotoixer.ai-world.top/images/og-image.svg",
                    "width": 1200,
                    "height": 630
                },
                "author": {
                    "@type": "Person",
                    "@id": "https://oldphotoixer.ai-world.top/about/author.html#author",
                    "name": "OldPhotoFixer Team",
                    "url": "https://oldphotoixer.ai-world.top/about/author.html"
                },
                "publisher": {
                    "@type": "Organization",
                    "@id": "https://oldphotoixer.ai-world.top/#organization",
                    "name": "OldPhotoFixer",
                    "logo": {
                        "@type": "ImageObject",
                        "url": "https://oldphotoixer.ai-world.top/images/logo.svg"
                    }
                },
                "mainEntityOfPage": {
                    "@type": "WebPage",
                    "@id": "{{canonicalUrl}}"
                },
                "inLanguage": "{{lang}}",
                "articleSection": "Blog",
                "keywords": "{{keywords}}",
                "wordCount": {{wordCount}}
            },
            {
                "@type": "BreadcrumbList",
                "@id": "{{canonicalUrl}}#breadcrumbs",
                "itemListElement": [
                    {
                        "@type": "ListItem",
                        "position": 1,
                        "name": "Home",
                        "item": "https://oldphotoixer.ai-world.top{{homeUrl}}"
                    },
                    {
                        "@type": "ListItem",
                        "position": 2,
                        "name": "Blog",
                        "item": "https://oldphotoixer.ai-world.top{{blogIndexUrl}}"
                    },
                    {
                        "@type": "ListItem",
                        "position": 3,
                        "name": "{{title}}",
                        "item": "{{canonicalUrl}}"
                    }
                ]
            },
            {
                "@type": "WebPage",
                "@id": "{{canonicalUrl}}",
                "url": "{{canonicalUrl}}",
                "name": "{{title}}",
                "description": "{{description}}",
                "isPartOf": {
                    "@id": "https://oldphotoixer.ai-world.top/#website"
                },
                "inLanguage": "{{lang}}"
            },
            {
                "@type": "Organization",
                "@id": "https://oldphotoixer.ai-world.top/#organization",
                "name": "OldPhotoFixer",
                "url": "https://oldphotoixer.ai-world.top"
            }
        ]
    }
    </script>
</head>
<body>
    <header class="header" id="header">
        <div class="container header-inner">
            <a href="{{homeUrl}}" class="logo"><img src="../images/logo.svg" alt="OldPhotoFixer - Free AI Photo Restoration Tool" width="170" height="36" loading="lazy"></a>
            <nav class="nav" aria-label="Main navigation">
                <a href="{{homeUrl}}" class="nav-link">{{nav.tool}}</a>
                <a href="{{blogIndexUrl}}" class="nav-link">{{nav.blog}}</a>
                <a href="{{homeUrl}}#features" class="nav-link">{{nav.features}}</a>
                <a href="{{privacyUrl}}" class="nav-link">{{nav.privacy}}</a>
            </nav>
        </div>
    </header>

    <main class="blog-post">
        <div class="container">
            <article itemscope itemtype="https://schema.org/Article">
                <header class="post-header">
                    <h1 itemprop="headline">{{title}}</h1>
                    <div class="post-meta">
                        <time datetime="{{date}}" itemprop="datePublished">{{formattedDate}}</time>
                        <span class="separator">•</span>
                        <span itemprop="timeRequired">{{readTime}} min read</span>
                    </div>
                </header>

                <div class="post-content" itemprop="articleBody">
                    {{content}}
                </div>

                <div class="post-cta">
                    <h3>{{cta.tryNow}}</h3>
                    <p>{{cta.description}}</p>
                    <a href="{{homeUrl}}#tool" class="cta-btn">{{cta.button}}</a>
                </div>

                <meta itemprop="author" content="OldPhotoFixer Team">
                <meta itemprop="publisher" content="OldPhotoFixer">
            </article>

            <nav class="post-nav">
                <a href="{{blogIndexUrl}}" class="back-link">← {{nav.backToBlog}}</a>
            </nav>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-links">
                <a href="{{homeUrl}}">{{nav.home}}</a>
                <a href="{{blogIndexUrl}}">{{nav.blog}}</a>
                <a href="{{privacyUrl}}">{{nav.privacy}}</a>
            </div>
            <p class="footer-copy">&copy; 2025 OldPhotoFixer. {{footer.copyright}}</p>
        </div>
    </footer>

    <script src="{{cssPath}}../js/header-scroll.js"></script>
</body>
</html>
