<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>

  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="100" fill="#e94560" opacity="0.1"/>
  <circle cx="350" cy="350" r="120" fill="#f472b6" opacity="0.1"/>

  <!-- Avatar circle -->
  <circle cx="200" cy="180" r="80" fill="#2a2a4a" stroke="url(#accentGrad)" stroke-width="3"/>

  <!-- Person silhouette -->
  <g transform="translate(200, 180)">
    <!-- Head -->
    <circle cx="0" cy="-25" r="30" fill="#3a3a5a"/>
    <!-- Body -->
    <ellipse cx="0" cy="40" rx="45" ry="35" fill="#3a3a5a"/>
  </g>

  <!-- AI text -->
  <text x="200" y="300" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="url(#accentGrad)" text-anchor="middle">
    AI Team
  </text>
  <text x="200" y="335" font-family="Arial, sans-serif" font-size="16" fill="#888" text-anchor="middle">
    Photo Restoration Experts
  </text>

  <!-- Decorative elements -->
  <g transform="translate(80, 350)">
    <circle cx="0" cy="0" r="8" fill="#e94560" opacity="0.5"/>
    <circle cx="25" cy="0" r="8" fill="#f472b6" opacity="0.5"/>
    <circle cx="50" cy="0" r="8" fill="#e94560" opacity="0.5"/>
  </g>
</svg>